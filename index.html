<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Snake</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-bottom: 10px;
    }

    canvas {
      background: black;
      border: 4px solid white;
    }

    .score {
      margin: 10px;
      font-size: 24px;
    }

    .tip {
      margin-top: 10px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Classic Snake</h1>
  <div class="score">分數：<span id="score">0</span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="tip">方向鍵控制</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreText = document.getElementById('score');

    const grid = 20;
    const tileCount = canvas.width / grid;

    let snake = [
      { x: 10, y: 10 }
    ];

    let food = {
      x: 15,
      y: 15
    };

    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameOver = false;

    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp':
          if (dy !== 1) {
            dx = 0;
            dy = -1;
          }
          break;

        case 'ArrowDown':
          if (dy !== -1) {
            dx = 0;
            dy = 1;
          }
          break;

        case 'ArrowLeft':
          if (dx !== 1) {
            dx = -1;
            dy = 0;
          }
          break;

        case 'ArrowRight':
          if (dx !== -1) {
            dx = 1;
            dy = 0;
          }
          break;
      }
    });

    function drawGame() {
      if (gameOver) {
        ctx.fillStyle = 'white';
        ctx.font = '30px Arial';
        ctx.fillText('Game Over', 110, 200);
        ctx.font = '18px Arial';
        ctx.fillText('重新整理頁面再玩一次', 100, 240);
        return;
      }

      moveSnake();

      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'red';
      ctx.fillRect(food.x * grid, food.y * grid, grid - 2, grid - 2);

      ctx.fillStyle = 'lime';
      snake.forEach(part => {
        ctx.fillRect(part.x * grid, part.y * grid, grid - 2, grid - 2);
      });
    }

    function moveSnake() {
      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
      ) {
        gameOver = true;
        return;
      }

      for (let i = 0; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          gameOver = true;
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreText.innerText = score;

        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } else {
        snake.pop();
      }
    }

    setInterval(drawGame, 100);
  </script>
</body>
</html>
